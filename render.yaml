services:
  - type: web
    name: jeene-backend
    runtime: python
    region: singapore
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: DATABASE_URL
        sync: false
      # Firebase Admin service-account JSON (the whole file's contents, pasted
      # in the Render dashboard). Used to verify Firebase ID tokens.
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
